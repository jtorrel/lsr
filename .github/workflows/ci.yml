name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
    RUSTFLAGS: "-D warnings"

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Tests
        run: cargo test --workspace